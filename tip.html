<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打赏支持</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f9f9f9;
      font-family: -apple-system, sans-serif;
    }
    h2 {
      font-size: 20px;
      color: #333;
      margin-bottom: 8px;
    }
    p {

    img {
      width: 260px;
      height: 260px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #aaa;
    }

<body>
  <h2>感谢打赏支持 ☕</h2>
  <p>长按图片识别收款码</p>
  <img src="./tip.png" alt="收款码" />

</html>
